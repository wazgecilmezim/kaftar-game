name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize npm and install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.kaftarmedia.game",
            "appName": "KAFTAR GAME",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF

      - name: Copy web files into webDir (www/)
        run: |
          mkdir -p www
          cp index.html www/
          cp game.js www/
          cp style.css www/

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Update Android plugins
        run: npx cap update android

      - name: Fix Kotlin stdlib duplicate classes
        run: |
          cat >> android/app/build.gradle << 'GRADLE'

          configurations.all {
              resolutionStrategy {
                  force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"
                  force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22"
                  force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22"
              }
          }
          GRADLE

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build AAB (Release - unsigned)
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="" \
            -Pandroid.injected.signing.store.password="" \
            -Pandroid.injected.signing.key.alias="" \
            -Pandroid.injected.signing.key.password=""

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaftar-game-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
