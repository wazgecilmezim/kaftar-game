name: Android Build
on:
  push:
    branches: [ "main", "master" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/android

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html style.css game.js privacy.html www/

      - name: Initialize Capacitor Android
        run: |
          npx cap add android

      - name: Fix SDK and Version
        run: |
          python3 - <<'EOF'
          import re

          # variables.gradle
          with open('android/variables.gradle', 'r') as f:
              content = f.read()
          content = re.sub(r'compileSdk\s*=\s*\d+', 'compileSdk = 35', content)
          content = re.sub(r'targetSdk\s*=\s*\d+', 'targetSdk = 35', content)
          content = re.sub(r'compileSdkVersion\s*=\s*\d+', 'compileSdkVersion = 35', content)
          content = re.sub(r'targetSdkVersion\s*=\s*\d+', 'targetSdkVersion = 35', content)
          with open('android/variables.gradle', 'w') as f:
              f.write(content)

          # app/build.gradle - versionCode
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()
          content = re.sub(r'versionCode\s+\d+', 'versionCode 11', content)
          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          # build.gradle - Android Gradle Plugin
          with open('android/build.gradle', 'r') as f:
              content = f.read()
          content = re.sub(r'com\.android\.tools\.build:gradle:[^\'"]+', 'com.android.tools.build:gradle:8.2.2', content)
          with open('android/build.gradle', 'w') as f:
              f.write(content)

          # gradle-wrapper.properties - Gradle version
          with open('android/gradle/wrapper/gradle-wrapper.properties', 'r') as f:
              content = f.read()
          content = re.sub(r'gradle-[\d.]+-all\.zip', 'gradle-8.2-all.zip', content)
          with open('android/gradle/wrapper/gradle-wrapper.properties', 'w') as f:
              f.write(content)

          print("Done!")
          EOF

      - name: Install Android SDK 35
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Fix Kotlin Duplicate Classes
        run: |
          echo "configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }" >> android/app/build.gradle

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Android Bundle (AAB)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d ' \n\r' | base64 --decode > keystore.jks

      - name: Sign AAB
        run: |
          jarsigner \
            -keystore keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -signedjar android/app/build/outputs/bundle/release/app-release-signed.aab \
            android/app/build/outputs/bundle/release/app-release.aab \
            "${{ secrets.KEY_ALIAS }}"

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: signed-kaftar-game-3
          path: android/app/build/outputs/bundle/release/app-release-signed.aab
