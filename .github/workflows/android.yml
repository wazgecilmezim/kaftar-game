name: Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Initialize npm and install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.kaftarmedia.game2",
            "appName": "KAFTAR GAME",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF

      - name: Copy web files into webDir (www/)
        run: |
          mkdir -p www
          cp index.html www/
          cp game.js www/
          cp style.css www/
          cp privacy.html www/

      - name: Add Android platform
        run: npx cap add android

      - name: Fix Google Play Name Policy
        run: |
          # Uygulama adını her yerde KAFTAR GAME olarak zorla düzeltiyoruz.
          # Bu adım Google'ın "Misleading Claims" hatasını çözen ana kısımdır.
          sed -i 's/Capacitor App/KAFTAR GAME/g' android/app/src/main/res/values/strings.xml
          sed -i 's/com.capacitor.app/com.kaftarmedia.game2/g' android/app/build.gradle

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Update Android plugins
        run: npx cap update android

      - name: Decode Keystore
        run: |
          # Bu adım için GitHub Secrets kısmında KEYSTORE_BASE64 tanımlı olmalıdır.
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/kaftar-release.keystore

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build AAB (Release - signed)
        run: |
          cd android
          # Google Play Console'da "Sürüm kodu kullanıldı" hatası almamak için kodu otomatik arttırabiliriz
          # Ancak şimdilik manuel gidelim.
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/kaftar-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaftar-game-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
