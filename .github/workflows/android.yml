name: Android Build
on:
  push:
    branches: [ "main", "master" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/android @capacitor/assets

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html style.css game.js privacy.html www/

      - name: Initialize Capacitor Android
        run: |
          npx cap add android

      # --- İKON OLUŞTURMA ---
      - name: Generate App Icons
        run: |
          if [ -f "kaftar game.jpeg" ]; then
            cp "kaftar game.jpeg" icon.png
          elif [ -f "kaftar game.jpg" ]; then
            cp "kaftar game.jpg" icon.png
          fi

          if [ -f icon.png ]; then
            npx capacitor-assets generate --android
          fi

      # --- API 35 VE VERSİYON 21 GÜNCELLEMESİ ---
      - name: Fix SDK and Version
        run: |
          python3 - <<'EOF'
          import re
          import os

          # 1. variables.gradle Güncelleme
          var_path = 'android/variables.gradle'
          if os.path.exists(var_path):
              with open(var_path, 'r') as f:
                  content = f.read()
              content = re.sub(r'compileSdk\s*=\s*\d+', 'compileSdk = 35', content)
              content = re.sub(r'targetSdk\s*=\s*\d+', 'targetSdk = 35', content)
              with open(var_path, 'w') as f:
                  f.write(content)

          # 2. app/build.gradle Güncelleme (Kesin çözüm için burayı da zorluyoruz)
          app_gradle_path = 'android/app/build.gradle'
          with open(app_gradle_path, 'r') as f:
              content = f.read()
          
          # API Düzeylerini 35 yap
          content = re.sub(r'compileSdk\s+\d+', 'compileSdk 35', content)
          content = re.sub(r'targetSdk\s+\d+', 'targetSdk 35', content)
          # Versiyon Kodunu 21 yap
          content = re.sub(r'versionCode\s+\d+', 'versionCode 21', content)
          
          with open(app_gradle_path, 'w') as f:
              f.write(content)

          # 3. Gradle ve Wrapper Güncelleme
          build_gradle = 'android/build.gradle'
          with open(build_gradle, 'r') as f:
              content = f.read()
          content = re.sub(r'com\.android\.tools\.build:gradle:[^\'"]+', 'com.android.tools.build:gradle:8.2.2', content)
          with open(build_gradle, 'w') as f:
              f.write(content)

          wrapper_path = 'android/gradle/wrapper/gradle-wrapper.properties'
          with open(wrapper_path, 'r') as f:
              content = f.read()
          content = re.sub(r'gradle-[\d.]+-all\.zip', 'gradle-8.2-all.zip', content)
          with open(wrapper_path, 'w') as f:
              f.write(content)
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Android Bundle (AAB)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d ' \n\r' | base64 --decode > keystore.jks

      - name: Sign AAB
        run: |
          jarsigner \
            -keystore keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -signedjar android/app/build/outputs/bundle/release/app-release-signed.aab \
            android/app/build/outputs/bundle/release/app-release.aab \
            "${{ secrets.KEY_ALIAS }}"

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: signed-kaftar-game-21
          path: android/app/build/outputs/bundle/release/app-release-signed.aab
