name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize npm and install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.kaftarmedia.game",
            "appName": "KAFTAR GAME",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF

      - name: Copy web files into webDir (www/)
        run: |
          mkdir -p www
          cp index.html www/
          cp game.js www/
          cp style.css www/

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Update Android plugins
        run: npx cap update android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaftar-game-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
