name: Android Build
on:
  push:
    branches: [ "main", "master" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/android @capacitor/assets

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html style.css game.js privacy.html www/

      - name: Initialize Capacitor Android
        run: |
          npx cap add android

      # --- İKON OLUŞTURMA ---
      - name: Generate App Icons
        run: |
          if [ -f "kaftar game.jpeg" ]; then
            cp "kaftar game.jpeg" icon.png
          elif [ -f "kaftar game.jpg" ]; then
            cp "kaftar game.jpg" icon.png
          fi

          if [ -f icon.png ]; then
            npx capacitor-assets generate --android
          fi

      # --- API 35 VE VERSİYON 22 ZORLAMASI ---
      - name: Fix SDK and Version
        run: |
          python3 - <<'EOF'
          import re
          import os

          def force_update(file_path, patterns):
              if not os.path.exists(file_path):
                  return
              with open(file_path, 'r') as f:
                  content = f.read()
              for pattern, replacement in patterns:
                  content = re.sub(pattern, replacement, content)
              with open(file_path, 'w') as f:
                  f.write(content)

          # 1. variables.gradle Güncelleme
          force_update('android/variables.gradle', [
              (r'compileSdk\s*=\s*\d+', 'compileSdk = 35'),
              (r'targetSdk\s*=\s*\d+', 'targetSdk = 35')
          ])

          # 2. app/build.gradle Güncelleme (Agresif Mod)
          force_update('android/app/build.gradle', [
              (r'compileSdk\s+\d+', 'compileSdk 35'),
              (r'targetSdk\s+\d+', 'targetSdk 35'),
              (r'versionCode\s+\d+', 'versionCode 22'),
              (r'compileSdkVersion\s+\d+', 'compileSdkVersion 35'),
              (r'targetSdkVersion\s+\d+', 'targetSdkVersion 35')
          ])

          # 3. Gradle ve Wrapper Güncelleme
          force_update('android/build.gradle', [
              (r'com\.android\.tools\.build:gradle:[^\'"]+', 'com.android.tools.build:gradle:8.2.2')
          ])
          force_update('android/gradle/wrapper/gradle-wrapper.properties', [
              (r'gradle-[\d.]+-all\.zip', 'gradle-8.2-all.zip')
          ])
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Android Bundle (AAB)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d ' \n\r' | base64 --decode > keystore.jks

      - name: Sign AAB
        run: |
          jarsigner \
            -keystore keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -signedjar android/app/build/outputs/bundle/release/app-release-signed.aab \
            android/app/build/outputs/bundle/release/app-release.aab \
            "${{ secrets.KEY_ALIAS }}"

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: signed-kaftar-game-22
          path: android/app/build/outputs/bundle/release/app-release-signed.aab
