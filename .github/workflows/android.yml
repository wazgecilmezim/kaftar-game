name: Android Build
on:
  push:
    branches: [ "main", "master" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/android

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html style.css game.js privacy.html www/

      - name: Initialize Capacitor Android
        run: |
          npx cap add android

      - name: Set Target SDK 35
        run: |
          sed -i 's/targetSdkVersion = .*/targetSdkVersion = 35/' android/app/build.gradle
          sed -i 's/compileSdkVersion = .*/compileSdkVersion = 35/' android/app/build.gradle
          sed -i 's/targetSdk = .*/targetSdk = 35/' android/app/build.gradle
          sed -i 's/compileSdk = .*/compileSdk = 35/' android/app/build.gradle

      - name: Bump Version Code
        run: |
          sed -i 's/versionCode = .*/versionCode = 10/' android/app/build.gradle

      - name: Check Version Code
        run: |
          cat android/app/build.gradle | grep -i version

      - name: Fix Kotlin Duplicate Classes
        run: |
          echo "configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }" >> android/app/build.gradle

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Android Bundle (AAB)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d ' \n\r' | base64 --decode > keystore.jks

      - name: Sign AAB
        run: |
          jarsigner \
            -keystore keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -signedjar android/app/build/outputs/bundle/release/app-release-signed.aab \
            android/app/build/outputs/bundle/release/app-release.aab \
            "${{ secrets.KEY_ALIAS }}"

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: signed-kaftar-game-3
          path: android/app/build/outputs/bundle/release/app-release-signed.aab
